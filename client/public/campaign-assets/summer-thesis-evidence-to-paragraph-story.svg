  <text x="108" y="250" font-family="Source Serif 4, Georgia, serif" font-size="90" font-weight="900" fill="#2D2A26">From source</text>
  <text x="108" y="350" font-family="Source Serif 4, Georgia, serif" font-size="90" font-weight="900" fill="#D4556B">base to</text>
  <text x="108" y="450" font-family="Source Serif 4, Georgia, serif" font-size="90" font-weight="900" fill="#2D2A26">paragraph.</text>
