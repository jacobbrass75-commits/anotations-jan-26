  <text x="162" y="1430" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="650" fill="#8A8580">Use quotes and notes from your library,</text>
  <text x="162" y="1474" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="650" fill="#8A8580">then verify citations before submitting.</text>
