  <text x="162" y="648" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#2D2A26">1. Find the passage</text>
  <rect x="162" y="700" width="650" height="16" rx="8" fill="#D4556B" opacity=".60" />
  <rect x="162" y="742" width="580" height="14" rx="7" fill="#5B7FA5" opacity=".45" />
  <rect x="108" y="930" width="864" height="300" rx="38" fill="#F5F3F0" stroke="#E8E4E0" />
  <text x="162" y="1008" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#2D2A26">2. Keep the context</text>
  <text x="204" y="1084" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="760" fill="#2D2A26">What came before</text>
<text x="204" y="1138" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="760" fill="#2D2A26">What the author means</text>
<text x="204" y="1192" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="760" fill="#2D2A26">Why it matters to your claim</text>
  <circle cx="166" cy="1072" r="12" fill="#D4556B" />
  <circle cx="166" cy="1126" r="12" fill="#5B7FA5" />
  <circle cx="166" cy="1180" r="12" fill="#5A9E8F" />
