<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Context integrity under an equal memory budget</title>
  <desc id="desc">The ScholarMark composite policy scored 96.4 percent on an eight-case stress suite under an equal 4K memory cap.</desc>
  <rect width="1200" height="675" fill="#fbfaf8"/>
  <rect x="52" y="48" width="1096" height="579" rx="28" fill="#ffffff" stroke="#e5e1dc" stroke-width="2"/>
  <text x="92" y="110" fill="#1d2433" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3">CONTEXT INTEGRITY STRESS TEST</text>
  <text x="92" y="166" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="750">Better memory is selective, not merely larger</text>
  <text x="92" y="204" fill="#69717d" font-family="Inter, Arial, sans-serif" font-size="20">Same frozen reader · eight generated cases · estimated 4K policy-memory cap</text>

  <text x="92" y="265" fill="#565f6b" font-family="Inter, Arial, sans-serif" font-size="17">Recent six exchanges</text>
  <rect x="282" y="242" width="212" height="32" rx="8" fill="#ccd2db"/>
  <text x="509" y="265" fill="#565f6b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">30.0%</text>

  <text x="92" y="337" fill="#565f6b" font-family="Inter, Arial, sans-serif" font-size="17">Full history</text>
  <rect x="282" y="314" width="419" height="32" rx="8" fill="#aeb6c2"/>
  <text x="716" y="337" fill="#565f6b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">59.2%</text>

  <text x="92" y="409" fill="#565f6b" font-family="Inter, Arial, sans-serif" font-size="17">Summary + recent</text>
  <rect x="282" y="386" width="457" height="32" rx="8" fill="#75bce8"/>
  <text x="754" y="409" fill="#347ca9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">64.6%</text>

  <text x="92" y="481" fill="#276bd5" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">ScholarMark composite</text>
  <rect x="282" y="458" width="682" height="32" rx="8" fill="#3f88f7"/>
  <text x="979" y="481" fill="#276bd5" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">96.4%</text>

  <rect x="796" y="244" width="294" height="172" rx="20" fill="#eaf3ff"/>
  <text x="828" y="292" fill="#276bd5" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">0 per-case losses</text>
  <text x="828" y="329" fill="#5c6672" font-family="Inter, Arial, sans-serif" font-size="17">against all three equal-budget</text>
  <text x="828" y="355" fill="#5c6672" font-family="Inter, Arial, sans-serif" font-size="17">baselines in the paired analysis</text>
  <text x="828" y="393" fill="#276bd5" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">45.9% fewer tokens</text>

  <text x="92" y="548" fill="#4f5967" font-family="Inter, Arial, sans-serif" font-size="18">Perfect observed recall on decisions, updates, exact quotes, attribution, retrieval, and abstention.</text>
  <text x="92" y="598" fill="#8a919b" font-family="Inter, Arial, sans-serif" font-size="13">Internal custom benchmark · July 2026 · small generated suite; not a universal memory-system ranking</text>
</svg>
