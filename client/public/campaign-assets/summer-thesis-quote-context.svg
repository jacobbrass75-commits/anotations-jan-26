<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  
    <defs>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2D2A26" flood-opacity=".12"/>
      </filter>
      <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#2D2A26" flood-opacity=".10"/>
      </filter>
    </defs>
  
  <rect width="1080" height="1080" fill="#FAFAF8" />
  <rect x="72" y="72" width="936" height="936" rx="46" fill="#FFFFFF" stroke="#E8E4E0" />
  <text x="126" y="152" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#2D2A26">ScholarMark</text>
  <text x="126" y="262" font-family="Source Serif 4, Georgia, serif" font-size="76" font-weight="900" fill="#2D2A26">Find the quote.</text>
  <text x="126" y="348" font-family="Source Serif 4, Georgia, serif" font-size="76" font-weight="900" fill="#D4556B">Keep the context.</text>
  <text x="126" y="426" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#8A8580">Write from evidence you can trace back to your sources.</text>
  <rect x="126" y="520" width="828" height="266" rx="34" fill="#F5F3F0" stroke="#E8E4E0" />
  <text x="176" y="590" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="27" font-weight="900" fill="#2D2A26">Quote found in your source base</text>
  <rect x="176" y="626" width="630" height="16" rx="8" fill="#D4556B" opacity=".62" />
  <rect x="176" y="664" width="710" height="14" rx="7" fill="#5B7FA5" opacity=".40" />
  <rect x="176" y="696" width="560" height="14" rx="7" fill="#5A9E8F" opacity=".42" />
  <text x="176" y="746" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#8A8580">Source details, page/section when available, and context stay attached.</text>
  <rect x="126" y="866" width="392" height="70" rx="35" fill="#2D2A26" />
  <text x="162" y="911" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="900" fill="#FFFFFF">scholarmark.ai/summer</text>
  <text x="558" y="910" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700" fill="#8A8580">For thesis and capstone writing.</text>
</svg>