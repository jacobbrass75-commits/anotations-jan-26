<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500">
  
    <defs>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2D2A26" flood-opacity=".12"/>
      </filter>
      <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#2D2A26" flood-opacity=".10"/>
      </filter>
    </defs>
  
  <rect width="1600" height="500" fill="#FAFAF8" />
  <rect x="36" y="36" width="1528" height="428" rx="34" fill="#FFFFFF" stroke="#E8E4E0" />
  <text x="86" y="116" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#2D2A26">ScholarMark</text>
  <text x="86" y="206" font-family="Source Serif 4, Georgia, serif" font-size="72" font-weight="900" fill="#2D2A26">The quote finder for</text>
  <text x="86" y="286" font-family="Source Serif 4, Georgia, serif" font-size="72" font-weight="900" fill="#D4556B">serious research writing.</text>
  <text x="86" y="342" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#8A8580">Search a large source base for passages with context.</text>
  <text x="86" y="376" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#8A8580">Draft from evidence students can verify.</text>
  <rect x="86" y="400" width="420" height="54" rx="27" fill="#2D2A26" />
  <text x="118" y="435" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">scholarmark.ai/summer</text>
  <rect x="1090" y="100" width="360" height="288" rx="30" fill="#F5F3F0" stroke="#E8E4E0" />
  <text x="1140" y="172" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="900" fill="#2D2A26">Quote + context</text>
  <rect x="1140" y="214" width="250" height="14" rx="7" fill="#D4556B" opacity=".62" />
  <rect x="1140" y="252" width="210" height="12" rx="6" fill="#5B7FA5" opacity=".46" />
  <rect x="1140" y="284" width="270" height="12" rx="6" fill="#5A9E8F" opacity=".45" />
  <text x="1140" y="342" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#8A8580">source + surrounding context</text>
</svg>