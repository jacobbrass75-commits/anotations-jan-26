<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Writing V3 quote integrity benchmark results</title>
  <desc id="desc">Updated context scored 99.2 percent average quote integrity, compared with 55.8 percent for raw context and 55.3 percent for the former harness.</desc>
  <rect width="1200" height="675" fill="#fbfaf8"/>
