  <text x="582" y="526" text-anchor="middle" fill="#276bd5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Updated context</text>

  <rect x="760" y="256" width="330" height="94" rx="18" fill="#eaf3ff"/>
  <text x="790" y="294" fill="#276bd5" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">+43.3 points</text>
