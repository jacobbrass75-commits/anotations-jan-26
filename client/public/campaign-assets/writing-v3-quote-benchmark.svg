  <text x="92" y="204" fill="#69717d" font-family="Inter, Arial, sans-serif" font-size="20">Mean quote integrity across five frozen readers · equal 8K memory budget</text>

  <line x1="108" y1="492" x2="702" y2="492" stroke="#ccd2db" stroke-width="2"/>
  <line x1="108" y1="272" x2="702" y2="272" stroke="#edf0f4" stroke-width="2"/>
