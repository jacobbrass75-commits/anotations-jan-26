  <rect x="150" y="369" width="112" height="123" rx="12" fill="#aeb6c2"/>
  <text x="206" y="351" text-anchor="middle" fill="#4f5967" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">55.8%</text>
  <text x="206" y="526" text-anchor="middle" fill="#555e69" font-family="Inter, Arial, sans-serif" font-size="18">Raw context</text>

  <rect x="338" y="370" width="112" height="122" rx="12" fill="#75bce8"/>
  <text x="394" y="351" text-anchor="middle" fill="#347ca9" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">55.3%</text>
  <text x="394" y="526" text-anchor="middle" fill="#555e69" font-family="Inter, Arial, sans-serif" font-size="18">Former harness</text>

  <rect x="526" y="274" width="112" height="218" rx="12" fill="#3f88f7"/>
