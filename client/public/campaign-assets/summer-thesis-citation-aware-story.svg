<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  
    <defs>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2D2A26" flood-opacity=".12"/>
      </filter>
      <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#2D2A26" flood-opacity=".10"/>
      </filter>
    </defs>
  
  <rect width="1080" height="1920" fill="#FAFAF8" />
  <rect x="54" y="54" width="972" height="1812" rx="58" fill="#FFFFFF" stroke="#E8E4E0" />
  <text x="108" y="146" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#2D2A26">ScholarMark</text>
  <text x="108" y="246" font-family="Source Serif 4, Georgia, serif" font-size="92" font-weight="900" fill="#2D2A26">Citations</text>
  <text x="108" y="346" font-family="Source Serif 4, Georgia, serif" font-size="92" font-weight="900" fill="#D4556B">should point</text>
  <text x="108" y="446" font-family="Source Serif 4, Georgia, serif" font-size="92" font-weight="900" fill="#2D2A26">back to sources.</text>
  <rect x="108" y="570" width="864" height="620" rx="38" fill="#F5F3F0" stroke="#E8E4E0" />
  <text x="162" y="650" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#2D2A26">Use your source base to:</text>
  <text x="204" y="742" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="760" fill="#2D2A26">Map claims to evidence</text>
<text x="204" y="810" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="760" fill="#2D2A26">Check quotes against originals</text>
<text x="204" y="878" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="760" fill="#2D2A26">Flag citation gaps before drafting</text>
<text x="204" y="946" text-anchor="start" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="760" fill="#2D2A26">Keep revision grounded in what you read</text>
  <circle cx="164" cy="730" r="13" fill="#D4556B" />
  <circle cx="164" cy="798" r="13" fill="#5B7FA5" />
  <circle cx="164" cy="866" r="13" fill="#5A9E8F" />
  <circle cx="164" cy="934" r="13" fill="#E9B44C" />
  <rect x="108" y="1290" width="864" height="214" rx="38" fill="#FFFFFF" stroke="#E8E4E0" />
  <text x="162" y="1368" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="900" fill="#2D2A26">Not a black box.</text>
  <text x="162" y="1420" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="650" fill="#8A8580">Writing support that keeps you close</text>
  <text x="162" y="1464" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="650" fill="#8A8580">to the evidence you actually added.</text>
  <rect x="108" y="1630" width="472" height="76" rx="38" fill="#2D2A26" />
  <text x="154" y="1679" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF">scholarmark.ai/summer</text>
  <text x="108" y="1775" font-family="Libre Franklin, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="650" fill="#8A8580">Always verify final citations against original sources.</text>
</svg>