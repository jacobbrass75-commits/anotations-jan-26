<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScholarMark - AI-Powered Research Annotation</title>
    <meta
      name="description"
      content="Upload academic PDFs, organize projects, and let AI automatically highlight and annotate relevant passages. Intelligent source management for researchers."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (() => {
        const storageKey = "sm-theme";
        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          document.documentElement.classList.toggle("dark", storedTheme === "dark");
        } catch {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <main style="max-width:72rem;margin:0 auto;padding:3rem 1.25rem;font-family:Inter,system-ui,sans-serif;color:#2d2a26">
        <p style="font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:#736b63">ScholarMark</p>
        <h1 style="max-width:48rem;font-size:clamp(2.25rem,7vw,4rem);line-height:1.05;margin:1rem 0">
          Get ahead on your thesis, capstone, or big research paper
        </h1>
        <p style="max-width:42rem;font-size:1.125rem;line-height:1.6;color:#625b54">
          Plan, outline, revise, and strengthen long academic papers with source-grounded writing support.
        </p>
        <a href="/sign-up?redirect_url=%2Fpricing%3Fonboarding%3D1%26source%3Dsummer" style="display:inline-block;margin-top:1.5rem;padding:.9rem 1.25rem;border-radius:.5rem;background:#7c3aed;color:white;text-decoration:none;font-weight:700">Start now</a>
        <noscript><p style="margin-top:1rem">JavaScript is required for the full ScholarMark workspace.</p></noscript>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
