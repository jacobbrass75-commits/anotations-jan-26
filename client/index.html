<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ScholarMark - AI-Powered Research Annotation</title>
    <meta name="description" content="Upload academic PDFs, organize projects, and let AI automatically highlight and annotate relevant passages. Intelligent source management for researchers." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (() => {
        const storageKey = "sm-theme";
        const storedTheme = window.localStorage.getItem(storageKey);
        document.documentElement.classList.toggle("dark", storedTheme === "dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
