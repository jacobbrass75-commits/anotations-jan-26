server {
    listen 80;
    listen [::]:80;
    server_name mcp.scholarmark.ai;
    access_log /var/log/nginx/mcp.access.log;

    location = /mcp. {
        rewrite ^ /mcp last;
    }

    location = /.well-known/oauth-authorization-server {
        proxy_pass http://127.0.0.1:5001/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;

        proxy_set_header Host app.scholarmark.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /authorize {
        proxy_pass http://127.0.0.1:5001/oauth/authorize;
        proxy_http_version 1.1;

        proxy_set_header Host app.scholarmark.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /token {
        proxy_pass http://127.0.0.1:5001/oauth/token;
        proxy_http_version 1.1;

        proxy_set_header Host app.scholarmark.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /register {
        proxy_pass http://127.0.0.1:5001/oauth/register;
        proxy_http_version 1.1;

        proxy_set_header Host app.scholarmark.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /revoke {
        proxy_pass http://127.0.0.1:5001/oauth/revoke;
        proxy_http_version 1.1;

        proxy_set_header Host app.scholarmark.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /mcp {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept "application/json, text/event-stream";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /sse {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_intercept_errors on;
        error_page 405 = @mcp_sse_probe_ok;
    }

    location @mcp_sse_probe_ok {
        default_type application/json;
        return 200 '{"service":"ScholarMark MCP Server","endpoint":"/sse","note":"Use GET /sse for legacy SSE streams and POST /mcp for JSON-RPC requests."}';
    }

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
