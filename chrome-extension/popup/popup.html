<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="login-view" style="display: none;">
      <div class="header">
        <h1>ScholarMark</h1>
        <p class="subtitle">Sign in to save highlights</p>
      </div>
      <div class="section">
        <p class="hint" id="login-hint">
          Continue with Google through ScholarMark, then this extension will connect automatically.
        </p>
        <button id="connect-btn" class="google-button">
          <span class="google-mark" aria-hidden="true">G</span>
          <span>Continue with Google</span>
        </button>
      </div>
    </div>

    <div id="main-view" style="display: none;">
      <div class="header">
        <h1>ScholarMark</h1>
        <p class="user-info" id="user-info"></p>
      </div>

      <div class="section">
        <label>Save to Project:</label>
        <select id="project-select">
          <option value="">Select project...</option>
        </select>
      </div>

      <div class="section">
        <p class="hint" id="status-text">Select text on any page, then right-click or press <kbd>Ctrl+Shift+S</kbd>.</p>
      </div>

      <div class="section">
        <button id="open-app" class="secondary">Open ScholarMark</button>
        <button id="reconnect-btn" class="secondary">Reconnect</button>
        <button id="logout-btn" class="danger">Sign Out</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
