<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>ScholarMark</h1>
    </div>

    <div id="disconnected-view" style="display: none;">
      <div class="section">
        <p class="subtitle">Connect your account</p>
        <button id="connect-btn" class="primary">Connect Account</button>
        <p class="hint">Sign in on the opened ScholarMark tab. Your extension will connect automatically.</p>
      </div>
    </div>

    <div id="connected-view" style="display: none;">
      <div class="section" id="account-switcher-wrap" style="display: none;">
        <label for="account-select">Account</label>
        <select id="account-select"></select>
      </div>

      <div class="section">
        <p class="status-line">
          <span class="status-dot"></span>
          <span id="account-status"></span>
        </p>
      </div>

      <div class="section">
        <label for="project-select">Save to Project:</label>
        <select id="project-select">
          <option value="">Select project...</option>
        </select>
        <p id="projects-error" class="error" style="display: none;"></p>
      </div>

      <div class="section">
        <p class="hint">Select text on any page, then right-click -> "Save to ScholarMark"</p>
        <p class="hint">Or use <kbd>Ctrl+Shift+S</kbd></p>
      </div>

      <div class="section">
        <button id="open-app" class="secondary">Open ScholarMark</button>
        <button id="add-account" class="primary">Add Another Account</button>
        <button id="disconnect-btn" class="danger">Disconnect</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
